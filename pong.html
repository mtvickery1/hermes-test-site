<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Pong — Mason Vickery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 
        0 0 40px rgba(14, 165, 233, 0.3),
        0 0 80px rgba(217, 70, 239, 0.2),
        inset 0 0 60px rgba(0, 0, 0, 0.5);
      border: 2px solid #1e293b;
    }
    .ui {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3rem;
      z-index: 10;
    }
    .score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      text-shadow: 0 0 20px currentColor;
    }
    .score.p1 { color: #0ea5e9; }
    .score.p2 { color: #d946ef; }
    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-start { background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; box-shadow: 0 0 30px rgba(14, 165, 233, 0.4); }
    .btn-start:hover { box-shadow: 0 0 40px rgba(14, 165, 233, 0.6); transform: translateY(-2px); }
    .btn-reset { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .btn-reset:hover { background: #334155; color: #e2e8f0; }
    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    .back-link:hover { color: #0ea5e9; border-color: #0ea5e9; }
    .title {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #475569;
      letter-spacing: 0.1em;
    }
    @media (max-width: 768px) {
      .ui { gap: 1.5rem; top: 1rem; }
      .score { font-size: 1.5rem; }
      .controls { bottom: 1rem; gap: 0.5rem; }
      button { padding: 0.5rem 1rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back</a>
  <div class="title">NEON PONG</div>

  <div class="ui">
    <div class="score p1" id="score1">0</div>
    <div class="score p2" id="score2">0</div>
  </div>

  <canvas id="game" width="800" height="500"></canvas>

  <div class="controls">
    <button class="btn-start" id="startBtn">Start Game</button>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    let ball = { x: W/2, y: H/2, r: 10, vx: 0, vy: 0, speed: 6 };
    let paddle1 = { x: 20, y: H/2 - 60, w: 12, h: 120 };
    let paddle2 = { x: W - 32, y: H/2 - 60, w: 12, h: 120 };
    let score1 = 0, score2 = 0;
    let running = false;
    let animationId = null;

    const score1El = document.getElementById('score1');
    const score2El = document.getElementById('score2');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    function resetBall() {
      ball.x = W/2; ball.y = H/2;
      const angle = (Math.random() - 0.5) * Math.PI/2;
      const dir = Math.random() > 0.5 ? 1 : -1;
      ball.vx = Math.cos(angle) * ball.speed * dir;
      ball.vy = Math.sin(angle) * ball.speed * (Math.random() > 0.5 ? 1 : -1);
    }

    function resetGame() {
      score1 = 0; score2 = 0;
      paddle1.y = H/2 - 60;
      paddle2.y = H/2 - 60;
      score1El.textContent = '0';
      score2El.textContent = '0';
      resetBall();
      running = false;
      startBtn.textContent = 'Start Game';
      draw();
    }

    function startGame() {
      if (!running) {
        running = true;
        startBtn.textContent = 'Pause';
        loop();
      } else {
        running = false;
        startBtn.textContent = 'Resume';
        cancelAnimationFrame(animationId);
      }
    }

    function drawRect(x, y, w, h, color, glowColor) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 20;
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
      ctx.shadowBlur = 0;
    }

    function drawCircle(x, y, r, color, glowColor) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function draw() {
      // Dark background with subtle grid
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      // Center line
      ctx.setLineDash([15, 15]);
      ctx.strokeStyle = 'rgba(14, 165, 233, 0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      drawRect(paddle1.x, paddle1.y, paddle1.w, paddle1.h, '#0ea5e9', '#0ea5e9');
      drawRect(paddle2.x, paddle2.y, paddle2.w, paddle2.h, '#d946ef', '#d946ef');

      // Ball
      drawCircle(ball.x, ball.y, ball.r, '#f8fafc', '#fff');

      // Trail effect
      if (running) {
        ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
        ctx.fillRect(0, 0, W, H);
      }
    }

    function update() {
      if (!running) return;

      // Ball movement
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top/bottom walls
      if (ball.y - ball.r <= 0 || ball.y + ball.r >= H) {
        ball.vy *= -1;
        ball.y = Math.max(ball.r, Math.min(H - ball.r, ball.y));
      }

      // Paddle collisions
      // Left paddle
      if (ball.x - ball.r <= paddle1.x + paddle1.w &&
          ball.y >= paddle1.y && ball.y <= paddle1.y + paddle1.h) {
        ball.x = paddle1.x + paddle1.w + ball.r;
        ball.vx *= -1.03;
        const hitPos = (ball.y - (paddle1.y + paddle1.h/2)) / (paddle1.h/2);
        ball.vy = hitPos * ball.speed * 0.7;
      }

      // Right paddle
      if (ball.x + ball.r >= paddle2.x &&
          ball.y >= paddle2.y && ball.y <= paddle2.y + paddle2.h) {
        ball.x = paddle2.x - ball.r;
        ball.vx *= -1.03;
        const hitPos = (ball.y - (paddle2.y + paddle2.h/2)) / (paddle2.h/2);
        ball.vy = hitPos * ball.speed * 0.7;
      }

      // Scoring
      if (ball.x < 0) {
        score2++;
        score2El.textContent = score2;
        resetBall();
      } else if (ball.x > W) {
        score1++;
        score1El.textContent = score1;
        resetBall();
      }

      // Simple AI for paddle2
      const paddle2Center = paddle2.y + paddle2.h/2;
      const diff = ball.y - paddle2Center;
      if (Math.abs(diff) > 10) {
        paddle2.y += Math.sign(diff) * Math.min(6, Math.abs(diff));
      }
      paddle2.y = Math.max(0, Math.min(H - paddle2.h, paddle2.y));
    }

    function loop() {
      update();
      draw();
      if (running) {
        animationId = requestAnimationFrame(loop);
      }
    }

    // Mouse/touch control for paddle1
    function handleMove(e) {
      const rect = canvas.getBoundingClientRect();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const y = clientY - rect.top - paddle1.h/2;
      paddle1.y = Math.max(0, Math.min(H - paddle1.h, y));
    }

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, { passive: false });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);

    // Initial draw
    resetBall();
    draw();
  </script>
</body>
</html>
